version: '3.8'

services:
  # ============================================
  # DATABASE
  # ============================================
  postgres:
    image: postgres:16-alpine
    container_name: ds-postgres
    environment:
      POSTGRES_USER: dsadmin
      POSTGRES_PASSWORD: dspass2026
      POSTGRES_INITDB_ARGS: "-c max_connections=200"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dsadmin"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - driving-school-network

  # ============================================
  # MESSAGE QUEUE
  # ============================================
  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: ds-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: dsrabbit
      RABBITMQ_DEFAULT_PASS: dsrabbit2026
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - driving-school-network

  # ============================================
  # EUREKA SERVER (Service Discovery)
  # ============================================
  eureka-server:
    build:
      context: ./backend/eureka-server
      dockerfile: Dockerfile
    container_name: ds-eureka
    ports:
      - "8761:8761"
    environment:
      - SPRING_APPLICATION_NAME=eureka-server
    depends_on:
      - postgres
    networks:
      - driving-school-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8761/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================
  # CONFIG SERVER
  # ============================================
  config-server:
    build:
      context: ./backend/config-server
      dockerfile: Dockerfile
    container_name: ds-config
    ports:
      - "8888:8888"
    environment:
      - SPRING_APPLICATION_NAME=config-server
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
    depends_on:
      eureka-server:
        condition: service_healthy
      postgres:
        condition: service_healthy
    networks:
      - driving-school-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8888/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================
  # MS-AUTH (Authentication Service)
  # ============================================
  ms-auth:
    build:
      context: ./backend/ms-auth
      dockerfile: Dockerfile
    container_name: ds-ms-auth
    ports:
      - "8081:8081"
    environment:
      - SPRING_APPLICATION_NAME=ms-auth
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/db_auth
      - SPRING_DATASOURCE_USERNAME=dsadmin
      - SPRING_DATASOURCE_PASSWORD=dspass2026
      - SPRING_RABBITMQ_HOST=rabbitmq
      - SPRING_RABBITMQ_PORT=5672
      - SPRING_RABBITMQ_USERNAME=dsrabbit
      - SPRING_RABBITMQ_PASSWORD=dsrabbit2026
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
      - SPRING_CLOUD_CONFIG_URI=http://config-server:8888
      - JWT_SECRET=driving-school-jwt-secret-key-minimum-512-bits-for-hs512-algorithm-2026-extended
    depends_on:
      config-server:
        condition: service_healthy
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - driving-school-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================
  # API GATEWAY
  # ============================================
  api-gateway:
    build:
      context: ./backend/api-gateway
      dockerfile: Dockerfile
    container_name: ds-api-gateway
    ports:
      - "8080:8080"
    environment:
      - SPRING_APPLICATION_NAME=api-gateway
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
      - SPRING_CLOUD_CONFIG_URI=http://config-server:8888
      - JWT_SECRET=driving-school-jwt-secret-key-minimum-512-bits-for-hs512-algorithm-2026-extended
    depends_on:
      config-server:
        condition: service_healthy
      ms-auth:
        condition: service_healthy
    networks:
      - driving-school-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================
  # FRONTEND (Vite Dev Server)
  # ============================================
  frontend:
    build:
      context: ./driving-school-app
      dockerfile: Dockerfile.dev
    container_name: ds-frontend
    ports:
      - "5173:5173"
    volumes:
      - ./driving-school-app/src:/app/src
      - ./driving-school-app/public:/app/public
    environment:
      - VITE_API_URL=http://localhost:8080
    command: npm run dev
    depends_on:
      - api-gateway
    networks:
      - driving-school-network

  # ============================================
  # NGINX (Reverse Proxy/Static Server)
  # ============================================
  nginx:
    image: nginx:alpine
    container_name: ds-nginx
    ports:
      - "80:80"
      - "3000:3000"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./driving-school-app/dist:/usr/share/nginx/html:ro
    depends_on:
      - api-gateway
      - frontend
    networks:
      - driving-school-network

networks:
  driving-school-network:
    driver: bridge

volumes:
  postgres_data:
    driver: local
