server:
  port: 8081

spring:
  application:
    name: ms-auth
  datasource:
    url: jdbc:postgresql://${DB_HOST:ds-postgres}:${DB_PORT:5432}/db_auth
    username: ${DB_USER:dsadmin}
    password: ${DB_PASS:dspass2026}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false

jwt:
  secret: ${JWT_SECRET:driving-school-jwt-secret-key-minimum-512-bits-for-hs512-algorithm-2026-extended}
  expiration: 86400000