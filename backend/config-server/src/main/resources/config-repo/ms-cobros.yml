server:
  port: 8086

spring:
  application:
    name: ms-cobros
  datasource:
    url: jdbc:postgresql://${DB_HOST:ds-postgres}:${DB_PORT:5432}/db_cobros
    username: ${DB_USER:dsadmin}
    password: ${DB_PASS:dspass2026}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
  rabbitmq:
    host: ${RABBITMQ_HOST:ds-rabbitmq}
    port: 5672
    username: ${RABBITMQ_USER:dsrabbit}
    password: ${RABBITMQ_PASS:dsrabbit2026}