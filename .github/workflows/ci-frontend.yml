name: CI - Frontend Build

on:
  push:
    branches:
      - develop
  pull_request:
    branches:
      - main
      - develop

jobs:
  build-frontend:
    name: Build Frontend Vue.js
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Check if frontend exists
        id: check_frontend
        run: |
          if [ -f "frontend/driving-school-app/package.json" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "Frontend project not yet initialized, skipping build"
          fi

      - name: Install dependencies
        if: steps.check_frontend.outputs.exists == 'true'
        run: |
          cd frontend/driving-school-app
          npm ci

      - name: Build frontend
        if: steps.check_frontend.outputs.exists == 'true'
        run: |
          cd frontend/driving-school-app
          npm run build

      - name: Run lint
        if: steps.check_frontend.outputs.exists == 'true'
        run: |
          cd frontend/driving-school-app
          npm run lint